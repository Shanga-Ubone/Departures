<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Commute Monitor</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 12px;
        }
        h1 {
            text-align: center;
            color: #ffbf00;
            letter-spacing: 2px;
            margin: 10px 0;
            font-size: 1.8em;
        }
        h2 { font-size: 1.2em; }
        .group-header {
            color: #4da6ff;
            border-bottom: 2px solid #4da6ff;
            margin-top: 25px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            font-size: 1em;
        }
        .board-container { display: flex; flex-direction: column; gap: 12px; }
        .station-card {
            background: #2b2b2b;
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .station-name {
            font-weight: bold;
            color: #ffbf00;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.95em;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px 6px; }
        .time { color: #fff; font-weight: bold; width: auto; }
        .dep-time.imminent { color: #ff6b6b; font-weight: bold; }
        .line { color: #ffbf00; width: auto; }
        .dest { color: #ddd; word-break: break-word; }
        .status { text-align: right; }
        .status.late { color: #ff6b6b; }
        .status.ontime { color: #69f0ae; }

        @media (max-width: 767px) {
            body { padding: 10px; }
            h1 { font-size: 1.5em; letter-spacing: 1px; margin: 5px 0; }
            .group-header { margin-top: 20px; font-size: 0.95em; }
            .board-container { gap: 10px; }
            .station-card { padding: 10px; }
            table { width: 100%; }
            th, td { padding: 10px 6px; font-size: 0.9em; }
            .time { font-size: 1.1em; }
        }

        #loading { text-align: center; margin-top: 15px; color: #888; font-size: 0.95em; }

        #last-updated {
            text-align: center;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 8px;
        }

        @media (max-width: 767px) {
            #loading { margin-top: 10px; }
            #last-updated { margin-bottom: 6px; }
        }

        .weather-container {
            background: #2b2b2b;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .weather-title {
            color: #4da6ff;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .weather-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            font-size: 1.1em;
            flex-wrap: wrap;
        }
        .temp { color: #ffbf00; font-weight: bold; font-size: 1.5em; }
        .condition { color: #e0e0e0; flex: 1 1 auto; min-width: 100px; }

        .hourly-forecast {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            overflow-x: auto;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
        }
        .hour-item {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 3px;
            text-align: center;
            white-space: nowrap;
            font-size: 0.85em;
            flex-shrink: 0;
            border-left: 2px solid #4da6ff;
            min-width: 60px;
        }
        .hour-time { color: #4da6ff; font-weight: bold; display: block; margin-bottom: 3px; }
        .hour-temp { color: #ffbf00; font-weight: bold; display: block; }
        .hour-condition { color: #ddd; font-size: 0.75em; }

        @media (max-width: 767px) {
            .weather-container { padding: 12px; margin-bottom: 12px; }
            .weather-info { gap: 10px; font-size: 1em; }
            .temp { font-size: 1.3em; }
            .hourly-forecast { gap: 6px; margin-top: 10px; }
            .hour-item { padding: 8px; min-width: 55px; font-size: 0.8em; }
        }

        .deviations-container {
            background: #2b2b2b;
            border-left: 4px solid #ff6b6b;
            padding: 12px;
            margin-top: 10px;
            border-radius: 0 4px 4px 0;
        }
        .deviation-header {
            color: #ff6b6b;
            font-weight: bold;
            font-size: 0.85em;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .deviations-list { display: none; margin-top: 6px; }
        .deviations-container.expanded .deviations-list { display: block; }
        .deviations-container.expanded .chevron { transform: rotate(180deg); }
        .deviation-item {
            color: #ffcccc;
            font-size: 0.9em;
            margin-bottom: 4px;
        }
        .deviation-item:last-child { margin-bottom: 0; }
        .deviation-item.CANCELLED { color: #ff6b6b; font-weight: bold; }
        .deviation-item.DIVERSION { color: #ff9800; }
        .deviation-item.DELAY { color: #ffeb3b; }

        /* Status banner */
        .status-banner {
            padding: 14px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .status-banner.ok   { background: #1a3d1a; color: #69f0ae; border: 1px solid #2d7a2d; }
        .status-banner.warn { background: #3d2e00; color: #ffd54f; border: 1px solid #b87d00; }
        .status-banner.crit { background: #3d0d0d; color: #ff6b6b; border: 1px solid #cc2222; }

        /* Stale data warning */
        #stale-banner {
            background: #3d2e00;
            color: #ffd54f;
            border: 1px solid #b87d00;
            border-radius: 4px;
            text-align: center;
            font-size: 0.85em;
            padding: 8px 12px;
            margin-bottom: 10px;
        }

        /* Card status colours via left border */
        .station-card        { border-left: 4px solid #2d7a2d; cursor: pointer; -webkit-user-select: none; user-select: none; }
        .station-card.warn   { border-left-color: #b87d00; }
        .station-card.crit   { border-left-color: #cc2222; }

        /* Card header row */
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #2d7a2d;
        }
        .station-card.warn .status-dot { background: #b87d00; }
        .station-card.crit .status-dot { background: #cc2222; }
        .card-header .station-name { margin-bottom: 0; flex: 1; }
        .chevron { color: #888; font-size: 0.75em; transition: transform 0.15s; flex-shrink: 0; }
        .station-card.expanded .chevron { transform: rotate(180deg); }

        /* Next departure summary */
        .card-next { color: #aaa; font-size: 0.85em; margin-top: 6px; padding-left: 20px; cursor: pointer; }
        .card-next.late   .next-status { color: #ff6b6b; }
        .card-next.ontime .next-status { color: #69f0ae; }

        /* Collapsible table */
        .departures-wrapper { display: none; margin-top: 10px; }
        .station-card.expanded .departures-wrapper { display: block; }

        /* Per-line group (line + destination), each with its own logical-line tracker */
        .line-group { background: #232323; border-radius: 4px; padding: 8px 10px; margin-bottom: 8px; }
        .line-group:last-child { margin-bottom: 0; }
        .line-group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .line-group-header .line-num {
            color: #ffbf00;
            font-weight: bold;
            background: rgba(255,191,0,0.1);
            padding: 1px 7px;
            border-radius: 3px;
        }
        .line-group-header .line-dest { color: #ddd; flex: 1; word-break: break-word; }
        .line-group-header .chevron { font-size: 0.7em; }
        .line-group.expanded .line-group-header .chevron { transform: rotate(180deg); }
        .line-departures { margin-top: 4px; }
        .line-departures td { padding: 4px 6px; }

        /* Logical-line vehicle tracker */
        .line-viz { display: none; margin-top: 10px; padding-top: 4px; }
        .line-group.expanded .line-viz { display: block; }
        .line-viz-unavailable { color: #666; font-size: 0.8em; padding: 6px 0; }
        .line-track {
            position: relative;
            height: 56px;
            margin: 6px 4px 0;
        }
        .line-track-bar {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            height: 2px;
            background: #444;
        }
        .line-stop {
            position: absolute;
            top: 0;
            transform: translateX(-50%);
            text-align: center;
            width: 70px;
        }
        .line-stop .stop-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            margin: 4px auto 4px;
        }
        .line-stop.target .stop-dot {
            width: 12px;
            height: 12px;
            background: #ffbf00;
            box-shadow: 0 0 6px rgba(255, 191, 0, 0.7);
        }
        .line-stop .stop-label {
            font-size: 0.68em;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .line-stop.target .stop-label { color: #ffbf00; font-weight: bold; }
        .line-vehicle {
            position: absolute;
            top: -3px;
            transform: translateX(-50%);
            font-size: 1.1em;
            line-height: 1;
            transition: left 9s linear;
        }

        /* Deviations at top of group */
        .deviations-container { margin-top: 0; margin-bottom: 12px; }

        /* Header */
        .header-row {
            position: relative;
            text-align: center;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-row h1 { margin: 0; flex: 1; }
        .settings-btn {
            color: #ffbf00;
            font-size: 1.4em;
            text-decoration: none;
            padding: 4px 8px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2b2b2b;
            line-height: 1;
        }

        /* Connection status dot */
        .conn-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-right: 8px;
        }
        .conn-dot.online  { background: #69f0ae; }
        .conn-dot.stale   { background: #ffd54f; }
        .conn-dot.offline { background: #ff6b6b; }

        /* Leave Now button */
        #leave-now-container { text-align: center; margin-bottom: 12px; }
        #leave-now-btn {
            background: #2b2b2b;
            color: #aaa;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 8px 16px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            cursor: pointer;
            letter-spacing: 1px;
        }
        #leave-now-btn.active {
            background: #3d2e00;
            color: #ffd54f;
            border-color: #b87d00;
        }

        .gtfs-flag {
            margin-left: 4px;
            color: #ffbf00;
            cursor: help;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

    <div class="header-row">
        <span id="conn-dot" class="conn-dot online" title="Connected"></span>
        <h1>DEPARTURES</h1>
        <a href="/config" class="settings-btn" title="Configure stations">&#9881;</a>
    </div>

    <div id="commute-status-banner" class="status-banner ok">● CHECKING...</div>
    <div id="stale-banner" style="display:none"></div>

    <div class="weather-container">
        <div class="weather-title">STOCKHOLM, SWEDEN</div>
        <div class="weather-info">
            <div class="temp" id="temp">--°C</div>
            <div class="condition" id="condition">Loading...</div>
        </div>
        <div class="hourly-forecast" id="hourly-forecast"></div>
    </div>

    <div id="last-updated"></div>

    <div id="leave-now-container">
        <button id="leave-now-btn" onclick="toggleLeaveNow()">🚶 LEAVE NOW (3m)</button>
    </div>

    <div id="board" class="board-container"></div>
    <div id="loading">Connecting to SL Network...</div>

    <script src="/static/app.js"></script>
</body>
</html>
